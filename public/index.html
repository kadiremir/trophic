<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>
    <link
      rel="preload"
      href="fonts/cinzel-decorative-900.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="preload"
      href="fonts/nunito-500.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <style id="trophic-fonts">
      @font-face {
        font-family: 'Cinzel Decorative';
        font-style: normal;
        font-weight: 900;
        font-display: block;
        src: url('fonts/cinzel-decorative-900.ttf') format('truetype');
      }

      @font-face {
        font-family: 'Nunito';
        font-style: normal;
        font-weight: 500;
        font-display: block;
        src: url('fonts/nunito-500.ttf') format('truetype');
      }

      #trophic-logo-title {
        background: linear-gradient(
          90deg,
          #ff0050, #ff6a00, #ffe600, #00ff7f,
          #00cfff, #5000ff, #cc00ff, #ff0050
        ) !important;
        background-size: 400px 100% !important;
        background-repeat: repeat-x !important;
        -webkit-background-clip: text !important;
        background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        color: transparent !important;
      }
    </style>
    <style id="expo-reset">
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #070b06;
      }

      body {
        overflow: hidden;
      }

      #root {
        display: flex;
        height: 100%;
        flex: 1;
        background: #070b06;
      }
    </style>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <div id="root"></div>
  <script>
    (function () {
      var pos = 0;
      var tileSize = 400;
      var speed = 2;
      function findAndAnimate() {
        var el = document.getElementById('trophic-logo-title');
        if (!el) { setTimeout(findAndAnimate, 100); return; }
        (function tick() {
          pos += speed;
          if (pos >= tileSize) pos -= tileSize;
          el.style.setProperty('background-position', pos + 'px center', 'important');
          requestAnimationFrame(tick);
        })();
      }
      findAndAnimate();
    })();
  </script>
  </body>
</html>
