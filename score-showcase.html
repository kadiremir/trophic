<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Target Score Bar — 10 Fill Animations</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0f1a;
    color: #e8e0c8;
    font-family: 'Courier New', monospace;
    padding: 24px;
  }
  h1 { text-align: center; color: #c9a84c; font-size: 1.3rem; margin-bottom: 5px; letter-spacing: 3px; }
  .subtitle { text-align: center; color: #6b7280; font-size: 0.75rem; margin-bottom: 28px; letter-spacing: 1px; }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    max-width: 1060px;
    margin: 0 auto;
  }

  /* ── card wrapper ── */
  .card {
    background: #131628;
    border: 1px solid #2a2f4a;
    border-radius: 12px;
    padding: 20px 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card-num { font-size: 0.6rem; color: #c9a84c; letter-spacing: 3px; opacity: 0.75; }

  /* ── goal card — identical structure to the real GameScreen goalNode ── */
  .goal-card {
    background: #0e1020;
    border: 1px solid #2a2f4a;
    border-radius: 10px;
    padding: 12px 14px;
  }
  .goal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 4px;
  }
  .goal-eyebrow { font-size: 0.62rem; color: #c9a84c; letter-spacing: 2px; text-transform: uppercase; }
  .goal-pct     { font-size: 0.8rem; color: #c9a84c; font-weight: 700; }
  .goal-value-row {
    display: flex; align-items: baseline; gap: 3px;
    margin-bottom: 8px;
  }
  .goal-now    { font-size: 1.9rem; font-weight: 900; color: #e8e0c8; line-height: 1; }
  .goal-div    { font-size: 1.25rem; color: #c9a84c; line-height: 1; }
  .goal-target { font-size: 1.5rem; color: #c9a84c; line-height: 1; }
  .goal-unit   { font-size: 0.7rem; color: #9a8454; letter-spacing: 1px; margin-left: 2px; }

  /* ── track shell — same as GameScreen progressTrack ── */
  .track {
    height: 10px;
    width: 100%;
    background: #2a2238;
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid #6a5224;
    position: relative;
  }
  /* each design fills .fill inside .track; special designs add extra DOM inside .track */

  .replay-btn {
    align-self: flex-end;
    background: #1a1e38;
    border: 1px solid #3a4060;
    color: #c9a84c;
    padding: 4px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.68rem;
    letter-spacing: 1px;
    font-family: inherit;
  }
  .replay-btn:hover { background: #242850; }
</style>
</head>
<body>

<h1>TARGET SCORE BAR — 10 FILL ANIMATIONS</h1>
<p class="subtitle">Same layout every time · only the bar fill differs · current=3 target=6 (50%) · click ↺ to replay</p>

<div class="gallery" id="gallery"></div>

<script>
/* ────────────────────────────────────────────────────────────
   Each design is a plain object:
     label  – shown in the card
     init   – called once to inject extra DOM into .track if needed
     play   – animates from 0 to 50%; receives (track, replay_cb)
──────────────────────────────────────────────────────────── */

const easeOut3  = t => 1 - Math.pow(1-t, 3);
const easeOut2  = t => 1 - Math.pow(1-t, 2);
const easeInOut = t => t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
const elastic   = t => t === 0 ? 0 : t === 1 ? 1 : Math.pow(2, -8*t) * Math.sin((t*8 - 0.75) * (2*Math.PI) / 3) + 1;

function raf(dur, ease, tick, done) {
  const start = performance.now();
  function frame(now) {
    const t = Math.min((now - start) / dur, 1);
    tick(ease(t), t);
    if (t < 1) requestAnimationFrame(frame);
    else if (done) done();
  }
  requestAnimationFrame(frame);
}

/* ─────── helper: create a basic solid fill bar ─────── */
function solidFill(track, color='#d4af37') {
  track.innerHTML = '';
  const el = document.createElement('div');
  el.style.cssText = `
    height:100%; border-radius:999px; width:0;
    background:${color}; position:relative; overflow:hidden;
  `;
  track.appendChild(el);
  return el;
}

/* ══════════════════════════════════════════════════════════
   1. SMOOTH EASE-OUT  (baseline reference, current behavior)
══════════════════════════════════════════════════════════ */
const D1 = {
  label: '#1 · Smooth Ease-Out (current baseline)',
  play(track) {
    const fill = solidFill(track, '#d4af37');
    raf(600, easeOut3, p => { fill.style.width = (p*50)+'%'; });
  }
};

/* ══════════════════════════════════════════════════════════
   2. ELASTIC OVERSHOOT  — bar shoots past target then snaps back
══════════════════════════════════════════════════════════ */
const D2 = {
  label: '#2 · Elastic Overshoot',
  play(track) {
    const fill = solidFill(track, '#d4af37');
    raf(900, elastic, p => { fill.style.width = (p*50)+'%'; });
  }
};

/* ══════════════════════════════════════════════════════════
   3. SHIMMER SWEEP  — fill slides in, then a bright shimmer
      highlight races across the filled section
══════════════════════════════════════════════════════════ */
const D3 = {
  label: '#3 · Shimmer Sweep',
  play(track) {
    track.innerHTML = '';
    // gradient fill bar
    const fill = document.createElement('div');
    fill.style.cssText = `
      position:absolute; top:0; left:0; height:100%;
      width:0; border-radius:999px;
      background: linear-gradient(to right, #8a6200, #d4af37);
      overflow:hidden;
    `;
    // shimmer streak inside
    const shimmer = document.createElement('div');
    shimmer.style.cssText = `
      position:absolute; top:0; left:-60px; width:50px; height:100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      border-radius:999px;
    `;
    fill.appendChild(shimmer);
    track.appendChild(fill);

    // 1) fill slides in
    raf(550, easeOut3, p => { fill.style.width = (p*50)+'%'; }, () => {
      // 2) shimmer races across
      const finalW = fill.getBoundingClientRect().width;
      raf(500, t => t, p => {
        shimmer.style.left = (p * (finalW + 60) - 60) + 'px';
      });
    });
  }
};

/* ══════════════════════════════════════════════════════════
   4. STEPPED FILL  — bar advances in discrete 1/6 increments
      each step pops in with a micro bounce
══════════════════════════════════════════════════════════ */
const D4 = {
  label: '#4 · Stepped (1-pip-at-a-time)',
  play(track) {
    const fill = solidFill(track, '#d4af37');
    const steps = 3; // 3 out of 6 pips
    for (let i = 0; i < steps; i++) {
      const targetPct = ((i+1)/6*100);
      setTimeout(() => {
        // overshoot by 2% then settle
        fill.style.transition = 'width 0.18s cubic-bezier(0.34,1.56,0.64,1)';
        fill.style.width = targetPct + '%';
      }, i * 220);
    }
    setTimeout(() => { fill.style.transition = ''; }, steps * 220 + 200);
  }
};

/* ══════════════════════════════════════════════════════════
   5. PULSE-ON-ARRIVAL  — bar eases in, then the leading edge
      pulses (glow burst) when it reaches 50%
══════════════════════════════════════════════════════════ */
const D5 = {
  label: '#5 · Pulse on Arrival',
  play(track) {
    track.innerHTML = '';
    const fill = document.createElement('div');
    fill.style.cssText = `
      position:absolute; top:0; left:0; height:100%; width:0;
      background:#d4af37; border-radius:999px; overflow:visible;
    `;
    // glow dot at leading edge
    const dot = document.createElement('div');
    dot.style.cssText = `
      position:absolute; right:-5px; top:50%; transform:translateY(-50%);
      width:10px; height:10px; border-radius:50%;
      background:#fff8dc; box-shadow:0 0 0px #d4af37;
      opacity:0;
    `;
    fill.appendChild(dot);
    track.appendChild(fill);

    raf(650, easeOut2, p => {
      fill.style.width = (p*50)+'%';
      // dot fades in while moving
      dot.style.opacity = Math.min(p*3, 1);
    }, () => {
      // pulse burst
      dot.style.transition = 'box-shadow 0.12s ease-out, transform 0.12s ease-out';
      dot.style.boxShadow = '0 0 14px 6px #d4af37, 0 0 30px 10px #d4af3755';
      dot.style.transform = 'translateY(-50%) scale(2.2)';
      setTimeout(() => {
        dot.style.transition = 'box-shadow 0.4s ease-in, transform 0.4s ease-in, opacity 0.4s';
        dot.style.boxShadow = '0 0 0px 0px #d4af37';
        dot.style.transform = 'translateY(-50%) scale(1)';
        dot.style.opacity = '0';
      }, 150);
    });
  }
};

/* ══════════════════════════════════════════════════════════
   6. LIQUID WAVE LEADING EDGE  — fill advances with a
      rippling sine wave on the right edge as it moves
══════════════════════════════════════════════════════════ */
const D6 = {
  label: '#6 · Liquid Wave Leading Edge',
  play(track) {
    track.innerHTML = '';
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;';
    svg.setAttribute('preserveAspectRatio','none');
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('fill','#d4af37');
    svg.appendChild(path);
    track.appendChild(svg);

    const trackH = 10;
    const dur = 900;
    const start = performance.now();
    function frame(now) {
      const t = Math.min((now - start) / dur, 1);
      const p = easeOut3(t);
      const W = track.clientWidth;
      const fillX = p * 0.5 * W;
      const amp = 3 * Math.max(0, 1 - t*1.3); // wave dies as it settles
      const freq = now / 120;
      // build path: left edge → wave front → bottom → close
      let d = `M 0 0 L ${fillX} 0`;
      // wave on right edge
      const wSteps = 6;
      for (let i = wSteps; i >= 0; i--) {
        const y = (i / wSteps) * trackH;
        const wx = fillX + Math.sin(y * 2 + freq) * amp;
        d += ` L ${wx} ${y}`;
      }
      d += ` L 0 ${trackH} Z`;
      path.setAttribute('d', d);
      if (t < 1) requestAnimationFrame(frame);
      else {
        // flat finish
        path.setAttribute('d', `M 0 0 L ${fillX} 0 L ${fillX} ${trackH} L 0 ${trackH} Z`);
      }
    }
    requestAnimationFrame(frame);
  }
};

/* ══════════════════════════════════════════════════════════
   7. PARTICLE BURST  — small gold sparks fly out from the
      leading edge as the fill advances
══════════════════════════════════════════════════════════ */
const D7 = {
  label: '#7 · Particle Burst (leading edge)',
  play(track) {
    track.style.overflow = 'visible';
    const fill = solidFill(track, '#d4af37');
    fill.style.overflow = 'visible';

    const particles = [];
    const W = track.clientWidth;
    const H = 10;
    const dur = 750;
    const start = performance.now();
    let lastEmitX = 0;

    function spawnParticle(x) {
      const p = document.createElement('div');
      const angle = (Math.random() - 0.5) * Math.PI;
      const speed = 20 + Math.random() * 25;
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed - 15;
      p.style.cssText = `
        position:absolute; width:3px; height:3px; border-radius:50%;
        background:#f0d080; pointer-events:none;
        left:${x}px; top:${H/2}px;
      `;
      track.appendChild(p);
      particles.push({ el:p, x, y:H/2, vx, vy, life:1 });
    }

    function frame(now) {
      const t = Math.min((now - start) / dur, 1);
      const p = easeOut3(t);
      const fx = p * 0.5 * W;
      fill.style.width = (p*50)+'%';

      // emit particles as fill advances
      if (fx - lastEmitX > 6) {
        spawnParticle(fx);
        lastEmitX = fx;
      }

      // update particles
      const dt = 0.016;
      for (let i = particles.length-1; i >= 0; i--) {
        const pr = particles[i];
        pr.x += pr.vx * dt;
        pr.y += pr.vy * dt;
        pr.vy += 60 * dt; // gravity
        pr.life -= dt * 2.5;
        pr.el.style.left = pr.x + 'px';
        pr.el.style.top = pr.y + 'px';
        pr.el.style.opacity = Math.max(0, pr.life);
        if (pr.life <= 0) { pr.el.remove(); particles.splice(i,1); }
      }

      if (t < 1) requestAnimationFrame(frame);
      else {
        // drain remaining particles
        function drain(now2) {
          for (let i = particles.length-1; i >= 0; i--) {
            const pr = particles[i];
            pr.x += pr.vx * 0.016;
            pr.y += pr.vy * 0.016;
            pr.vy += 60 * 0.016;
            pr.life -= 0.016 * 2.5;
            pr.el.style.left = pr.x + 'px'; pr.el.style.top = pr.y + 'px';
            pr.el.style.opacity = Math.max(0, pr.life);
            if (pr.life <= 0) { pr.el.remove(); particles.splice(i,1); }
          }
          if (particles.length > 0) requestAnimationFrame(drain);
          else track.style.overflow = 'hidden';
        }
        requestAnimationFrame(drain);
      }
    }
    requestAnimationFrame(frame);
  }
};

/* ══════════════════════════════════════════════════════════
   8. GRADIENT REVEAL  — fill is a vivid gold→white→gold
      gradient; the fill mask slides to reveal it left→right
══════════════════════════════════════════════════════════ */
const D8 = {
  label: '#8 · Gradient Reveal',
  play(track) {
    track.innerHTML = '';
    // background gradient always full-width, hidden behind clip
    const bg = document.createElement('div');
    bg.style.cssText = `
      position:absolute; top:0; left:0; height:100%; width:50%;
      border-radius:999px;
      background: linear-gradient(90deg, #7a5200 0%, #c9a84c 35%, #fff8c0 55%, #c9a84c 75%, #8a6000 100%);
      clip-path: inset(0 100% 0 0 round 999px);
    `;
    track.appendChild(bg);
    raf(700, easeInOut, p => {
      // reveal left→right by shrinking the right clip
      bg.style.clipPath = `inset(0 ${100 - p*100}% 0 0 round 999px)`;
    });
  }
};

/* ══════════════════════════════════════════════════════════
   9. CHARGING / FLICKER  — fill stutters and flickers like
      a power meter charging up, then locks solid at 50%
══════════════════════════════════════════════════════════ */
const D9 = {
  label: '#9 · Charging Flicker',
  play(track) {
    const fill = solidFill(track, '#d4af37');
    const totalDur = 1000;
    const target = 50;
    const start = performance.now();
    function frame(now) {
      const t = Math.min((now - start) / totalDur, 1);
      if (t < 1) {
        const base = easeOut2(t) * target;
        // flicker: random noise that decreases as we near the end
        const noise = (1 - t) * (Math.random() - 0.5) * 12;
        fill.style.width = Math.max(0, Math.min(target+2, base + noise)) + '%';
        requestAnimationFrame(frame);
      } else {
        // snap clean to exactly 50%
        fill.style.transition = 'width 0.1s ease-out';
        fill.style.width = target + '%';
        // glow flash on lock
        fill.style.boxShadow = '0 0 12px 4px #d4af37aa';
        setTimeout(() => { fill.style.boxShadow = 'none'; fill.style.transition = ''; }, 300);
      }
    }
    requestAnimationFrame(frame);
  }
};

/* ══════════════════════════════════════════════════════════
   10. DELAYED GLOW TRAIL  — fill slides in, leaving a glowing
       trail that fades: leading edge is bright, tail is dim
══════════════════════════════════════════════════════════ */
const D10 = {
  label: '#10 · Glow Trail',
  play(track) {
    track.innerHTML = '';
    // trail layer (wider, blurred glow behind fill)
    const trail = document.createElement('div');
    trail.style.cssText = `
      position:absolute; top:-2px; left:0; height:calc(100% + 4px);
      width:0; border-radius:999px;
      background: linear-gradient(to right, transparent, #d4af3755, #d4af37aa);
      filter: blur(3px);
    `;
    // solid fill on top
    const fill = document.createElement('div');
    fill.style.cssText = `
      position:absolute; top:0; left:0; height:100%; width:0;
      border-radius:999px;
      background: linear-gradient(to right, #8a6200, #d4af37 70%, #f5e090);
    `;
    track.appendChild(trail);
    track.appendChild(fill);

    raf(750, easeOut3, p => {
      fill.style.width  = (p*50) + '%';
      // trail lags 15% behind
      trail.style.width = (Math.max(0, p - 0.15) * 50 * 1.4) + '%';
    });
  }
};

/* ──────────────────────────────────────────────────────────
   BUILD GALLERY
────────────────────────────────────────────────────────── */
const DESIGNS = [D1, D2, D3, D4, D5, D6, D7, D8, D9, D10];

function buildCard(design, idx) {
  const card = document.createElement('div');
  card.className = 'card';

  const num = document.createElement('div');
  num.className = 'card-num';
  num.textContent = design.label;
  card.appendChild(num);

  // goal card (matching GameScreen goalNode layout)
  const goal = document.createElement('div');
  goal.className = 'goal-card';
  goal.innerHTML = `
    <div class="goal-header">
      <span class="goal-eyebrow">Target Score</span>
      <span class="goal-pct">50%</span>
    </div>
    <div class="goal-value-row">
      <span class="goal-now">3</span>
      <span class="goal-div">/</span>
      <span class="goal-target">6</span>
      <span class="goal-unit">pts</span>
    </div>
    <div class="track" id="track-${idx}"></div>
  `;
  card.appendChild(goal);

  const btn = document.createElement('button');
  btn.className = 'replay-btn';
  btn.textContent = '↺ Replay';
  btn.onclick = () => design.play(document.getElementById('track-'+idx));
  card.appendChild(btn);

  return card;
}

const gallery = document.getElementById('gallery');
DESIGNS.forEach((d, i) => gallery.appendChild(buildCard(d, i)));

// auto-play on load, staggered
window.addEventListener('load', () => {
  DESIGNS.forEach((d, i) => {
    setTimeout(() => d.play(document.getElementById('track-'+i)), 300 + i*100);
  });
});
</script>
</body>
</html>
